<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="globals.css" />
    <script src="script.js"></script>
    <title>CONTROLLER - IoT Robotic Hand</title>
    <style>

    </style>
</head>

<body class="robo-bg">
    <!-- Racing Lines Background -->
    <div class="racing-lines">
        <div class="race-line" style="animation: slide-0 3s linear infinite;"></div>
        <div class="race-line" style="animation: slide-1 4s linear infinite;"></div>
        <div class="race-line" style="animation: slide-2 5s linear infinite;"></div>
    </div>

    <!-- Navigation Bar -->
    <nav
        style="padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; z-index: 100; width: 100%;">
        <div style="display: flex; gap: 16px;">
            <a href="index.html" class="btn-secondary" style="padding: 8px 18px; font-size: 0.95rem;">Home</a>
            <a href="about.html" class="btn-secondary" style="padding: 8px 18px; font-size: 0.95rem;">About</a>
            <a href="controller.html" class="btn-primary" style="padding: 8px 18px; font-size: 0.95rem;">Take
                Control</a>
        </div>
    </nav>

    <div class="container">
        <!-- Hero Section -->
        <section class="hero animate-fade-in">
            <h1 class="gradient-text">TAKE CONTROL OVER
                <br> The Robotic Hand
            </h1>
            <p style="color: #d1d5db; margin-top: 20px;">Adjust each finger position with precision control</p>
        </section>

        <!-- Connection Status -->
        <div class="glass animate-fade-in"
            style="text-align: center; margin-bottom: 30px; background: rgba(16, 185, 129, 0.1); border-color: rgba(16, 185, 129, 0.3); color: #10b981;">
            <div
                style="display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #10b981; box-shadow: 0 0 10px #10b981; margin-right: 8px;">
            </div>
            System Ready - All Controls Active
        </div>
        <!-- Finger Control Sliders - Compact Vertical -->
<div class="glass animate-slide-in-bottom stagger-1" style="margin-bottom: 60px;">
    <h2 style="font-size: 2rem; margin-bottom: 20px; text-align: center;">
        <span class="gradient-text">Finger Control</span>
    </h2>
    <div class="finger-sliders-vertical" style="display: flex; justify-content: center; align-items: flex-end; gap: 12px; height: 300px; max-width: 500px; margin: 0 auto;">
        <!-- Thumb -->
        <div style="display: flex; flex-direction: column; align-items: center;">
            <input type="range" id="thumb" min="0" max="180" value="90" 
                   oninput="setFingerAngle('thumb', this.value)" 
                   style="writing-mode: bt-lr; transform: rotate(-90deg); width: 180px;">
            <label for="thumb">Thumb</label>
            <span id="thumb-value">90°</span>
        </div>
        <!-- Index -->
        <div style="display: flex; flex-direction: column; align-items: center;">
            <input type="range" id="index" min="0" max="180" value="90" 
                   oninput="setFingerAngle('index', this.value)" 
                   style="writing-mode: bt-lr; transform: rotate(-90deg); width: 180px;">
            <label for="index">Index</label>
            <span id="index-value">90°</span>
        </div>
        <!-- Middle -->
        <div style="display: flex; flex-direction: column; align-items: center;">
            <input type="range" id="middle" min="0" max="180" value="90" 
                   oninput="setFingerAngle('middle', this.value)" 
                   style="writing-mode: bt-lr; transform: rotate(-90deg); width: 180px;">
            <label for="middle">Middle</label>
            <span id="middle-value">90°</span>
        </div>
        <!-- Ring -->
        <div style="display: flex; flex-direction: column; align-items: center;">
            <input type="range" id="ring" min="0" max="180" value="90" 
                   oninput="setFingerAngle('ring', this.value)" 
                   style="writing-mode: bt-lr; transform: rotate(-90deg); width: 180px;">
            <label for="ring">Ring</label>
            <span id="ring-value">90°</span>
        </div>
        <!-- Pinky -->
        <div style="display: flex; flex-direction: column; align-items: center;">
            <input type="range" id="pinky" min="0" max="180" value="90" 
                   oninput="setFingerAngle('pinky', this.value)" 
                   style="writing-mode: bt-lr; transform: rotate(-90deg); width: 180px;">
            <label for="pinky">Pinky</label>
            <span id="pinky-value">90°</span>
        </div>
    </div>
</div>
        <!-- Quick Gestures -->
        <div class="glass animate-slide-in-bottom stagger-1" style="margin-bottom: 60px;">
            <h2 style="font-size: 2rem; margin-bottom: 30px; text-align: center;">
                <span class="gradient-text">Quick Gestures</span>
            </h2>
            <div class="buttons">
                <button class="btn-secondary" onclick="setGesture('close')">Close Hand</button>
                <button class="btn-secondary" onclick="setGesture('countU')">Count Up</button>
                <button class="btn-secondary" onclick="setGesture('countD')">Count Down</button>
                <button class="btn-secondary" onclick="setGesture('peace')">Peace Sign</button>
                <button class="btn-secondary" onclick="setGesture('ok')">OK Sign</button>
                <button class="btn-secondary" onclick="setGesture('hold')">Hold Phone</button>
                <button class="btn-secondary" onclick="setGesture('come')">Come Here</button>
            </div>

            <!-- Reset Button -->
            <div style="text-align: center; margin-top: 40px;">
                <button class="btn-primary" onclick="setGesture('reset')" style="width: 100%; max-width: 400px; padding: 16px;">
                    RESET HAND
                </button>
            </div>
        </div>

        <!-- Footer -->
        <footer
            style="text-align: center; margin-top: 100px; padding: 40px 0; border-top: 1px solid rgba(255, 255, 255, 0.1);">
            <p style="color: #9ca3af; margin-bottom: 16px;">© 2026 IoT Robotic Hand</p>
            <div class="buttons">
                <a href="index.html" class="btn-secondary" style="padding: 8px 20px; font-size: 0.875rem;">Home</a>
                <a href="about.html" class="btn-secondary" style="padding: 8px 20px; font-size: 0.875rem;">Features</a>
                <a href="index.html" class="btn-secondary" style="padding: 8px 20px; font-size: 0.875rem;">Future
                    Plans</a>
                <a href="https://github.com/miscu123" target="_blank" class="btn-secondary"
                    style="padding: 8px 20px; font-size: 0.875rem;">GitHub</a>
                <a href="mailto:mihaialbu4567@gmail.com" class="btn-secondary"
                    style="padding: 8px 20px; font-size: 0.875rem;">Contact</a>
            </div>
        </footer>
    </div>
</body>
</html>
