[platformio]
;src_dir = C:\Users\AlbuMihai\AppData\Local\Programs\Microsoft VS Code\Robotic-Hand\src
src_dir = C:\Users\AlbuMihai\Downloads\Web-Controlled-Robotic-IoT-Hand-main\Web-Controlled-Robotic-IoT-Hand-main\Robotic-Hand\src

[env:mhetesp32devkit]
platform = espressif32
board = mhetesp32devkit
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
lib_deps = 
	madhephaestus/ESP32Servo@^3.0.9
	bodmer/TFT_eSPI@^2.5.43
	me-no-dev/AsyncTCP@^1.1.1
	me-no-dev/ESPAsyncWebServer@^3.6.0
lib_ignore = 
	AsyncTCP_RP2040W
	ESPAsyncTCP
	AsyncTCP-main
	ESPAsyncWebServer-master
	WebServer
build_flags = -DCORE_DEBUG_LEVEL=0
